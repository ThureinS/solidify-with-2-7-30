services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spaced_repetition
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # .env's REDIS_URL points at localhost, which is wrong inside the
      # compose network -- override it to the service name.
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

volumes:
  db_data:
  redis_data:
